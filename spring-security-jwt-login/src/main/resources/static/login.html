<!DOCTYPE html>
<html>
<head>
    <title>JWT Login</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2f3640;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #result {
            margin-top: 15px;
            font-size: 12px;
            word-break: break-all;
            color: green;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>JWT Login</h2>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <div id="result"></div>
</div>

<script>
    function login() {
        fetch("http://localhost:8082/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: document.getElementById("username").value,
                password: document.getElementById("password").value
            })
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("result").innerText = "JWT Token:\n" + data;
        });
    }
</script>

</body>
</html>
